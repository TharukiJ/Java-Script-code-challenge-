<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Kanban Board</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Project Board</h1>
    </header>
    <div class="board">
        <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>To Do</h2>
            <div class="task" draggable="true" ondragstart="drag(event)" id="task1">Design Database</div>
            <div class="task" draggable="true" ondragstart="drag(event)" id="task2">Create Wireframes</div>
        </div>
        <div class="column" id="in-progress" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>In Progress</h2>
            <div class="task" draggable="true" ondragstart="drag(event)" id="task3">Set up Environment</div>
        </div>
        <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>Done</h2>
            <div class="task" draggable="true" ondragstart="drag(event)" id="task4">Gather Requirements</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
